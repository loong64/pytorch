name: build (torch)

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *

jobs:
  check:
    runs-on: ubuntu-slim
    outputs:
      create: ${{ steps.check_release.outputs.create }}
      version: ${{ steps.get_version.outputs.version }}
    strategy:
      matrix:
        app: ['torch']
        repo: ['pytorch/pytorch']
    steps:
      - name: Check version
        id: get_version
        run: |
          version=$(curl -s "https://api.github.com/repos/${{ matrix.repo }}/releases/latest" | jq -r .tag_name)
          if [ -z "${version}" ] || [ "${version}" == "null" ]; then
            echo "Failed to get version"
            exit 1
          fi

          echo "version=${version}" >> $GITHUB_ENV
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo ""
          echo "========== Build Args =========="
          echo "PyTorch current version: ${version}"

      - name: Check release
        id: check_release
        run: |
          gh release view ${version} -R ${{ github.repository }} >/dev/null 2>&1 || echo "create=1" >> $GITHUB_ENV
          gh release view ${version} -R ${{ github.repository }} | grep ${{ matrix.app }}-.*.whl >/dev/null 2>&1 || echo "create=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v6
        if: env.create == '1'

      - name: Create tag
        if: env.create == '1'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.version }} || true
          git push origin ${{ env.version }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: env.create == '1'
        run: |
          gh release create ${{ env.version }} -R ${{ github.repository }} --title "PyTorch ${version/v/}" --notes "**Full Changelog**: [${{ env.version }}](https://github.com/${{ matrix.repo }}/releases/tag/${{ env.version }})" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.create == '1'
    strategy:
      fail-fast: false
      matrix:
        DESIRED_PYTHON: ["3.10", "3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          repository: pytorch/pytorch
          ref: ${{ needs.check.outputs.version }}
          submodules: true

      - name: Prepare build
        run: |
          app_version=${{ needs.check.outputs.version }}
          wget -qO - https://github.com/loong64/pytorch/raw/refs/heads/main/patch_loong64.patch | patch -p1

          cd third_party/sleef
          wget -qO - https://github.com/loong64/pytorch/raw/refs/heads/main/sleef/sleef_loong64.patch | patch -p1
          cd -

          cd third_party/cpuinfo
          wget -qO - https://github.com/loong64/pytorch/raw/refs/heads/main/cpuinfo/cpuinfo_loong64.patch | patch -p1
          cd -

          echo "PYTORCH_BUILD_NUMBER=1" >> $GITHUB_ENV
          echo "PYTORCH_BUILD_VERSION=${app_version/v/}" >> $GITHUB_ENV
          echo "PIP_EXTRA_INDEX_URL=https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple" >> $GITHUB_ENV

          mkdir -p wheelhouse
          chmod +x .ci/manywheel/build.sh

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build wheels
        env: 
          PYTORCH_ROOT: /pytorch
          PACKAGE_TYPE: manywheel
          DESIRED_CUDA: cpu
          GPU_ARCH_TYPE: cpu-loongarch64
          DOCKER_IMAGE: ghcr.io/loong64/manylinuxloongarch64-builder
          DOCKER_IMAGE_TAG_PREFIX: cpu-loongarch64
          DESIRED_PYTHON: "${{ matrix.DESIRED_PYTHON }}"
          BUILD_ENVIRONMENT: linux-loongarch64-binary-manywheel-clang
          PYTORCH_FINAL_PACKAGE_DIR: /artifacts
          PIP_EXTRA_INDEX_URL: "https://gitlab.com/api/v4/projects/65746188/packages/pypi/simple"
        run: |
          DOCKER_CMD="${PYTORCH_ROOT}/.ci/manywheel/build.sh"
          docker run --rm \
            -e PYTORCH_ROOT \
            -e PACKAGE_TYPE \
            -e DESIRED_CUDA \
            -e GPU_ARCH_TYPE \
            -e SKIP_ALL_TESTS=1 \
            -e DESIRED_PYTHON \
            -e BUILD_ENVIRONMENT \
            -e PYTORCH_FINAL_PACKAGE_DIR \ 
            -e PIP_EXTRA_INDEX_URL \
            -v $(pwd):/pytorch \
            -v $(pwd)/wheelhouse:/${PYTORCH_FINAL_PACKAGE_DIR} \
          ${DOCKER_IMAGE}:${DOCKER_IMAGE_TAG_PREFIX} \
          sh -c "${DOCKER_CMD}"

      - name: Upload wheels
        run: |
          pip install twine==6.0.1
          for file in wheelhouse/*.whl; do
            twine upload --repository-url https://gitlab.com/api/v4/projects/65746188/packages/pypi $file || true
          done
        env:
          TWINE_USERNAME: ${{ github.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.GL_TOKEN }}

      - name: Upload release
        run:
          gh release upload ${{ needs.check.outputs.version }} -R ${{ github.repository }} wheelhouse/*.whl --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}